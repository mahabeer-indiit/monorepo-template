name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

# Cancel any in-flight runs for the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: lint / typecheck / build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # Reads the version from package.json#packageManager automatically.
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier check
        # `-w` scopes to the workspace root's package.json (pnpm 9 doesn't
        # implicitly run root scripts from cwd).
        run: pnpm -w run format:check

      - name: Lint, typecheck, build (all workspace packages)
        # Explicit `--filter='./...'` so turbo always sees every workspace package
        # regardless of git state. Without it, turbo's default scoping can pick
        # up only the most-recently-touched package and silently skip the rest.
        run: pnpm turbo run lint typecheck build --filter='./...'
